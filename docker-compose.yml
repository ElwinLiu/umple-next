name: umpleonline-dev

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - ./data/models:/data/models
      - ./jars:/jars:ro
      - ./examples:/examples:ro
      - /usr/local/bin/txl:/usr/local/bin/txl:ro
      - /usr/local/lib/txl:/usr/local/lib/txl:ro
    environment:
      - UMPLE_SYNC_JAR=/jars/umplesync.jar
      - MODEL_STORE_PATH=/data/models
      - EXAMPLE_PATH=/examples
      - EXECUTION_URL=http://code-exec:4400
      - PORT=3001
    depends_on:
      code-exec:
        condition: service_healthy

  code-exec:
    build:
      context: ./code-exec
    ports:
      - "4400:4400"
    group_add:
      - "${DOCKER_GID:-0}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/models:/data/models
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4400/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
