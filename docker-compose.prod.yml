name: umple-next-prod

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/elwinliu/umple-next/backend:latest}
    restart: unless-stopped
    cpus: 2
    mem_limit: 2g
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data/models:/data/models
      - /usr/local/bin/txl:/usr/local/bin/txl:ro
      - /usr/local/lib/txl:/usr/local/lib/txl:ro
    environment:
      - UMPLE_SYNC_JAR=/jars/umplesync.jar
      - MODEL_STORE_PATH=/data/models
      - EXAMPLE_PATH=/examples
      - EXECUTION_URL=http://code-exec:4400
      - PORT=3001
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      code-exec:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/elwinliu/umple-next/frontend:latest}
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 256m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    ports:
      - "3100:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  code-exec:
    image: ${CODE_EXEC_IMAGE:-ghcr.io/elwinliu/umple-next/code-exec:latest}
    restart: unless-stopped
    cpus: 1
    mem_limit: 768m
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    group_add:
      - "${DOCKER_GID}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/models:/data/models
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4400/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
