name: Release

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch, tag, or commit SHA to release
        required: true
        default: master
        type: string
      release_title:
        description: Optional production release title
        required: false
        type: string
      notes:
        description: Optional operator notes to prepend to generated release notes
        required: false
        type: string

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  release:
    name: Release to Production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        env:
          INPUT_RELEASE_TITLE: ${{ inputs.release_title }}
        run: |
          SHA="$(git rev-parse HEAD)"
          SHORT_SHA="${SHA::12}"
          TIMESTAMP="$(date -u +%Y%m%d-%H%M%S)"
          PREFIX="ghcr.io/${GITHUB_REPOSITORY,,}"

          if [ -n "$INPUT_RELEASE_TITLE" ]; then
            TITLE="$INPUT_RELEASE_TITLE"
          else
            TITLE="Production release ${SHORT_SHA}"
          fi

          {
            echo "sha=$SHA"
            echo "short_sha=$SHORT_SHA"
            echo "release_tag=release-${TIMESTAMP}-${SHORT_SHA}"
            echo "release_title=$TITLE"
            echo "prefix=$PREFIX"
            echo "backend_image=${PREFIX}/backend:sha-${SHA}"
            echo "frontend_image=${PREFIX}/frontend:sha-${SHA}"
            echo "code_exec_image=${PREFIX}/code-exec:sha-${SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify published images exist
        run: |
          docker buildx imagetools inspect "${{ steps.meta.outputs.backend_image }}" > /dev/null
          docker buildx imagetools inspect "${{ steps.meta.outputs.frontend_image }}" > /dev/null
          docker buildx imagetools inspect "${{ steps.meta.outputs.code_exec_image }}" > /dev/null

      - name: Copy release files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: docker-compose.prod.yml,scripts/release.sh
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Release via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            bash "${{ secrets.DEPLOY_PATH }}/scripts/release.sh" \
              "${{ secrets.DEPLOY_PATH }}" \
              "${{ steps.meta.outputs.backend_image }}" \
              "${{ steps.meta.outputs.frontend_image }}" \
              "${{ steps.meta.outputs.code_exec_image }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_NOTES: ${{ inputs.notes }}
        run: |
          SUMMARY="$(cat <<EOF
          Deployed commit: \`${{ steps.meta.outputs.sha }}\`
          Source ref: \`${{ inputs.git_ref }}\`

          Images:
          - \`${{ steps.meta.outputs.backend_image }}\`
          - \`${{ steps.meta.outputs.frontend_image }}\`
          - \`${{ steps.meta.outputs.code_exec_image }}\`
          EOF
          )"

          if [ -n "$INPUT_NOTES" ]; then
            SUMMARY="${SUMMARY}

          Operator notes:
          ${INPUT_NOTES}"
          fi

          gh release create "${{ steps.meta.outputs.release_tag }}" \
            --target "${{ steps.meta.outputs.sha }}" \
            --title "${{ steps.meta.outputs.release_title }}" \
            --latest \
            --generate-notes \
            --notes "$SUMMARY"

      - name: Summarize release
        run: |
          {
            echo "## Released to Production"
            echo ""
            echo "- Commit: \`${{ steps.meta.outputs.sha }}\`"
            echo "- Backend: \`${{ steps.meta.outputs.backend_image }}\`"
            echo "- Frontend: \`${{ steps.meta.outputs.frontend_image }}\`"
            echo "- Code Exec: \`${{ steps.meta.outputs.code_exec_image }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
