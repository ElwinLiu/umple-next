name: Publish Images

on:
  push:
    branches: [master]

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  images:
    name: Build & Push Images
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          echo "prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch umplesync.jar
        run: |
          mkdir -p jars
          gh release download jars/v1.36.0 --pattern 'umplesync.jar' --dir jars --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.prefix }}/backend:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.prefix }}/backend:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.prefix }}/frontend:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.prefix }}/frontend:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}

      - name: Build and push code-exec
        uses: docker/build-push-action@v6
        with:
          context: code-exec
          push: true
          tags: |
            ${{ steps.meta.outputs.prefix }}/code-exec:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.prefix }}/code-exec:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}

      - name: Summarize published images
        run: |
          {
            echo "## Published Images"
            echo ""
            echo "- Backend: \`${{ steps.meta.outputs.prefix }}/backend:${{ steps.meta.outputs.sha_tag }}\`"
            echo "- Frontend: \`${{ steps.meta.outputs.prefix }}/frontend:${{ steps.meta.outputs.sha_tag }}\`"
            echo "- Code Exec: \`${{ steps.meta.outputs.prefix }}/code-exec:${{ steps.meta.outputs.sha_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
