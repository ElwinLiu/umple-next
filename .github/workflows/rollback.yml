name: Rollback

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to rollback to (e.g. latest, sha-abc1234)'
        required: true
        type: string

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  rollback:
    name: Rollback to ${{ inputs.tag }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set image prefix
        id: meta
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            bash <<'ROLLBACK'
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}

            TAG="${{ inputs.tag }}"
            PREFIX="${{ steps.meta.outputs.prefix }}"

            echo "==> Rolling back to tag: $TAG"

            cat > docker-compose.override.yml <<EOF
            services:
              backend:
                image: ${PREFIX}/backend:${TAG}
              frontend:
                image: ${PREFIX}/frontend:${TAG}
              code-exec:
                image: ${PREFIX}/code-exec:${TAG}
            EOF

            docker-compose -f docker-compose.prod.yml -f docker-compose.override.yml pull
            docker-compose -f docker-compose.prod.yml -f docker-compose.override.yml up -d --remove-orphans

            echo "==> Waiting for backend health..."
            for i in $(seq 1 30); do
              if docker-compose -f docker-compose.prod.yml exec -T backend wget -q --spider http://localhost:3001/api/health 2>/dev/null; then
                echo "Backend healthy!"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: Backend did not become healthy within 30s"
                docker-compose -f docker-compose.prod.yml logs backend --tail=50
                exit 1
              fi
              sleep 1
            done

            echo "==> Rollback complete!"
            docker-compose -f docker-compose.prod.yml ps
            ROLLBACK
