name: Rollback

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to rollback to (e.g. latest, sha-abc1234)'
        required: true
        type: string

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  rollback:
    name: Rollback to ${{ inputs.tag }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set image prefix
        id: meta
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Copy rollback script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: scripts/rollback.sh
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: bash ${{ secrets.DEPLOY_PATH }}/scripts/rollback.sh ${{ secrets.DEPLOY_PATH }} ${{ inputs.tag }} ${{ steps.meta.outputs.prefix }}
