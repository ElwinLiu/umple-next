name: CI

on:
  workflow_call:
  pull_request:
  push:
    branches: [master]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bun run tsc -b --noEmit

      - name: Build
        run: bun run build

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/server

  images:
    name: Build & Push Images
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          echo "prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=pr-${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ${{ steps.meta.outputs.prefix }}/backend:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.prefix }}/backend:${{ steps.meta.outputs.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ${{ steps.meta.outputs.prefix }}/frontend:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.prefix }}/frontend:${{ steps.meta.outputs.sha }}

      - name: Build and push code-exec
        uses: docker/build-push-action@v6
        with:
          context: code-exec
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ${{ steps.meta.outputs.prefix }}/code-exec:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.prefix }}/code-exec:${{ steps.meta.outputs.sha }}
