name: Registry Cleanup

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    name: Cleanup old GHCR versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Delete stale container versions
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const keepRecentPerPackage = 50;
            const keepReleaseHistory = 10;
            const packageNames = [`${repo}/backend`, `${repo}/frontend`, `${repo}/code-exec`];

            const ownerInfo = await github.rest.users.getByUsername({ username: owner });
            const ownerType = ownerInfo.data.type === "Organization" ? "org" : "user";

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const protectedTags = new Set(["latest"]);
            for (const release of releases.filter((r) => !r.draft).slice(0, keepReleaseHistory)) {
              if (release.target_commitish) {
                protectedTags.add(`sha-${release.target_commitish}`);
              }
            }

            const routes = ownerType === "org"
              ? {
                  list: "GET /orgs/{org}/packages/{package_type}/{package_name}/versions",
                  del: "DELETE /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}",
                  params: { org: owner, package_type: "container" },
                }
              : {
                  list: "GET /users/{username}/packages/{package_type}/{package_name}/versions",
                  del: "DELETE /users/{username}/packages/{package_type}/{package_name}/versions/{package_version_id}",
                  params: { username: owner, package_type: "container" },
                };

            const summary = [];

            for (const packageName of packageNames) {
              const versions = await github.paginate(routes.list, {
                ...routes.params,
                package_name: packageName,
                per_page: 100,
              });

              versions.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              const keepIds = new Set(versions.slice(0, keepRecentPerPackage).map((version) => version.id));

              let deleted = 0;
              for (const version of versions) {
                const tags = version.metadata?.container?.tags ?? [];
                const hasProtectedTag = tags.some((tag) => protectedTags.has(tag));

                if (keepIds.has(version.id) || hasProtectedTag) {
                  continue;
                }

                try {
                  await github.request(routes.del, {
                    ...routes.params,
                    package_name: packageName,
                    package_version_id: version.id,
                  });
                  deleted += 1;
                } catch (error) {
                  core.warning(`Failed to delete ${packageName} version ${version.id}: ${error.message}`);
                }
              }

              summary.push(`- ${packageName}: deleted ${deleted} old version(s), kept ${Math.min(versions.length, keepRecentPerPackage)} recent version(s) plus protected release tags`);
            }

            await core.summary
              .addHeading("Registry Cleanup")
              .addRaw(summary.join("\n"), true)
              .write();
