name: Bug Report
description: Report a bug in UmpleOnline
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please search [existing issues](https://github.com/umple/umple-next/issues) before submitting.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Open UmpleOnline
        2. Enter the following Umple code: ...
        3. Click "Generate Java"
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include any error messages or screenshots.
    validations:
      required: true

  - type: textarea
    id: umple-code
    attributes:
      label: Umple code
      description: If applicable, paste the Umple code that triggers the bug.
      render: text

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Editor (CodeMirror)
        - Diagram (class diagram / state machine)
        - Code generation
        - Code execution
        - UI / layout
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      description: e.g. Chrome 130 on macOS 15
